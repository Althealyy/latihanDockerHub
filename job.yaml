apiVersion: batch/v1
kind: Job
metadata:
  name: analisis-data-job
spec:
  template:
    spec:
      containers:
      - name: analisis-data
        image: username/analisis-data-app:v.1.1
        env:
        - name: DATA_NILAI
          value: "85,90,78,92,88"
      restartPolicy: Never
  backoffLimit: 2